<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>David Bergman</title>
    <meta
      name="description"
      content="David Bergman's personal site for projects and writing."
    />
    <link rel="canonical" href="https://bergmandavid.com/" />
    <meta property="og:title" content="David Bergman" />
    <meta
      property="og:description"
      content="David Bergman's personal site for projects and writing."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bergmandavid.com/" />
    <meta name="theme-color" content="#38cbb5" />
    <link rel="preload" href="assets/blog.png" as="image" />
    <link rel="preload" href="assets/writing.jpg" as="image" />
    <link rel="preload" href="assets/david.jpg" as="image" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main
      class="horizontal-stage"
      data-loop-scroller
      aria-label="David Bergman site sections"
    >
      <section class="panel panel-writing" aria-hidden="true">
        <img class="panel-media" src="assets/writing.jpg" alt="" />
      </section>
      <section class="panel panel-projects" id="projects">
        <img class="panel-media" src="assets/blog.png" alt="projects" />
      </section>
      <section class="panel panel-david" id="home">
        <h1 class="sr-only">david bergman</h1>
        <img class="panel-media" src="assets/david.jpg" alt="" />
      </section>
      <section class="panel panel-writing" id="writing">
        <img class="panel-media" src="assets/writing.jpg" alt="writing" />
      </section>
      <section class="panel panel-projects" aria-hidden="true">
        <img class="panel-media" src="assets/blog.png" alt="" />
      </section>
    </main>

    <script src="site.js"></script>
  </body>
</html>
